version: '3.8'

# Por defecto usa .env.local
# Para producción: docker-compose --env-file .env.production up -d

services:
  # Base de datos compartida
  mysql:
    image: mysql:8.0
    container_name: mvp_database
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: ${MYSQL_CHARACTER_SET_SERVER:-utf8mb4}
      MYSQL_COLLATION_SERVER: ${MYSQL_COLLATION_SERVER:-utf8mb4_unicode_ci}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mvp_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Aplicación PHP
  php-app:
    build: ./php-app
    container_name: mvp_php_app
    ports:
      - "${PHP_PORT_1}:80"
      - "${PHP_PORT_2}:80"
      - "${PHP_PORT_3}:80"
    volumes:
      - ./php-app:/var/www/html
      - ./android-app:/var/www/html/android-app:ro
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mvp_network

  # Aplicación C# Blazor (Web)
  csharp-app-blazer:
    build: ./csharp-app-blazer
    container_name: mvp_csharp_blazer
    ports:
      - "${BLAZER_PORT_1}:5000"
      - "${BLAZER_PORT_2}:5000"
      - "${BLAZER_PORT_3}:5000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Container
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mvp_network

  # Android APK Builder — compila y sirve app-release.apk
  android-builder:
    build:
      context: ./android-studio-app
      args:
        PHP_URL: ${ANDROID_PHP_URL:-http://10.0.2.2:8000}
    container_name: mvp_android_builder
    ports:
      - "${ANDROID_BUILDER_PORT_1:-8080}:5000"
      - "${ANDROID_BUILDER_PORT_2:-8081}:5000"
      - "${ANDROID_BUILDER_PORT_3:-8082}:5000"
    networks:
      - mvp_network

  # PhpMyAdmin para gestionar la base de datos
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mvp_phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT_1}:80"
      - "${PHPMYADMIN_PORT_2}:80"
      - "${PHPMYADMIN_PORT_3}:80"
    environment:
      PMA_HOST: ${DB_HOST}
      PMA_PORT: ${DB_PORT}
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - mysql
    networks:
      - mvp_network

volumes:
  mysql_data:

networks:
  mvp_network:
    driver: bridge